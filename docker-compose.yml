version: '3.8'

services:
  web:
    image: php:8.2-apache
    container_name: rooms_web
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html
      - ./src:/var/www/src
      - ./php.conf:/etc/apache2/sites-available/000-default.conf
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=secret
      - DB_NAME=rooms_db
    depends_on:
      - mysql
    networks:
      - rooms_network

  mysql:
    image: mysql:8.0
    container_name: rooms_mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: rooms_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - rooms_network

volumes:
  mysql_data:

networks:
  rooms_network:
    driver: bridge
